{% extends "base.html" %}
{% block title %}Login — ForecastIQ{% endblock %}

{% block content %}
<div class="auth-card">
  <h2>Sign In</h2>
  <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
    <div class="form-group">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        name="email"
        class="form-control"
        placeholder="you@example.com"
        required
        autocomplete="email"
      />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        class="form-control"
        placeholder="Password"
        required
        autocomplete="current-password"
      />
    </div>
    <button type="submit" class="btn btn-primary">Sign In</button>
  </form>
  <p class="auth-link">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
</div>
{% endblock %}
