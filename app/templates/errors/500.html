{% extends "base.html" %}
{% block title %}Server Error — ForecastIQ{% endblock %}

{% block content %}
<div class="card" style="max-width:520px;margin:3rem auto;text-align:center;">
  <h1 style="font-size:3rem;color:#e53935;margin-bottom:0.25rem;">500</h1>
  <h2 style="font-size:1.25rem;margin-bottom:1rem;">Something Went Wrong</h2>
  <p class="text-muted" style="margin-bottom:1.5rem;">
    An unexpected error occurred on our end. Please try again in a moment.
  </p>
  <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary" style="width:auto;display:inline-block;">
    Back to Dashboard
  </a>
</div>
{% endblock %}
